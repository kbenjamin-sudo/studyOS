<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studyos – Your Learning Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
    <style>
        :root {
            --cream: #FAF7F0;
            --ink: #2D2A26;
            --terracotta: #D97757;
            --forest: #6B8E7F;
            --sand: #E8DCC4;
            --warm-red: #C85846;
            --soft-green: #A4C3B2;
            --deep-ink: #1A1816;
            --stroke: rgba(45, 42, 38, 0.12);
            --glow: rgba(217, 119, 87, 0.2);
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.15) rotate(-8deg); }
            75% { transform: scale(1.15) rotate(8deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(1000px) rotate(720deg); opacity: 0; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px var(--glow); }
            50% { box-shadow: 0 0 40px var(--glow), 0 0 60px var(--glow); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--ink);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Fraunces', serif;
        }

        /* Auth Screen */
        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--sand) 100%);
            padding: 2rem;
        }

        .auth-container {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 24px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(45, 42, 38, 0.08);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 3rem;
            font-weight: 900;
            color: var(--ink);
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        .auth-header p {
            color: var(--ink);
            opacity: 0.6;
            font-size: 1rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 3px solid var(--stroke);
            padding-bottom: 0.5rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--ink);
            opacity: 0.4;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-tab.active {
            opacity: 1;
            color: var(--terracotta);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -0.65rem;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--terracotta), var(--forest));
            border-radius: 3px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--ink);
        }

        .form-group input {
            padding: 1rem 1.2rem;
            border: 2px solid var(--stroke);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--cream);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--terracotta);
            box-shadow: 0 0 0 4px var(--glow);
            background: white;
        }

        .btn-auth {
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--terracotta), var(--warm-red));
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 0.5rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(217, 119, 87, 0.4);
        }

        .btn-auth:active {
            transform: scale(0.98);
        }

        /* Main App */
        .app-container {
            display: none;
        }

        .app-container.active {
            display: block;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(250, 247, 240, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 3px solid var(--stroke);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-family: 'Fraunces', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid var(--stroke);
            border-radius: 50px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--terracotta), var(--forest));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        .btn-signout {
            padding: 0.7rem 1.5rem;
            background: transparent;
            color: var(--ink);
            border: 2px solid var(--stroke);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-signout:hover {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }

        /* Dashboard */
        .dashboard {
            padding: 6rem 2rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .welcome-section {
            margin-bottom: 3rem;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
        }

        .welcome-section h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .welcome-section p {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        /* Notes Grid */
        .notes-section {
            margin-bottom: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 3px solid var(--stroke);
        }

        .section-header h2 {
            font-family: 'Fraunces', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink);
        }

        .btn-new {
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--terracotta), var(--warm-red));
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px var(--glow);
        }

        .btn-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(217, 119, 87, 0.4);
        }

        .btn-new:active {
            transform: scale(0.96);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .note-card {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 20px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--terracotta), var(--forest));
            transform: scaleY(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .note-card:hover::before {
            transform: scaleY(1);
        }

        .note-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(45, 42, 38, 0.15);
            border-color: var(--terracotta);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .note-title {
            font-family: 'Fraunces', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 0.8rem;
        }

        .note-preview {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--ink);
            opacity: 0.7;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 2px solid var(--stroke);
        }

        .note-date {
            font-size: 0.85rem;
            opacity: 0.5;
            font-variant-numeric: tabular-nums;
        }

        .note-actions {
            display: flex;
            gap: 0.5rem;
        }

        .note-action {
            width: 36px;
            height: 36px;
            border: 2px solid var(--stroke);
            border-radius: 10px;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .note-action:hover {
            background: var(--terracotta);
            border-color: var(--terracotta);
            transform: scale(1.1);
        }

        /* Editor Modal */
        .editor-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45, 42, 38, 0.6);
            backdrop-filter: blur(10px);
            z-index: 2000;
            padding: 2rem;
            animation: fadeInUp 0.3s ease;
        }

        .editor-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .editor-container {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 80px rgba(45, 42, 38, 0.2);
        }

        .editor-header {
            padding: 2rem;
            border-bottom: 3px solid var(--stroke);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title-input {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 700;
            border: none;
            outline: none;
            color: var(--ink);
            width: 100%;
            padding: 0.5rem 0;
        }

        .editor-toolbar {
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--stroke);
            display: flex;
            gap: 0.5rem;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--stroke);
            border-radius: 10px;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .toolbar-btn:hover {
            background: var(--terracotta);
            border-color: var(--terracotta);
            color: white;
        }

        .editor-content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .editor-content {
            font-family: 'Fraunces', serif;
            font-size: 1.15rem;
            line-height: 1.8;
            outline: none;
            min-height: 400px;
            color: var(--ink);
        }

        .editor-content:empty::before {
            content: 'Start writing your thoughts...';
            color: var(--ink);
            opacity: 0.3;
            font-style: italic;
        }

        .editor-footer {
            padding: 1.5rem 2rem;
            border-top: 3px solid var(--stroke);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .save-status {
            font-size: 0.9rem;
            color: var(--forest);
            font-weight: 600;
        }

        .btn-close {
            padding: 0.8rem 2rem;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-close:hover {
            background: var(--deep-ink);
            transform: scale(1.05);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .empty-state p {
            font-size: 1.1rem;
            opacity: 0.6;
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                padding: 5rem 1rem 2rem;
            }

            .welcome-section h1 {
                font-size: 2.5rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .editor-modal {
                padding: 0;
            }

            .editor-container {
                border-radius: 0;
                max-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Studyos</h1>
                <p>Your learning companion</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="signup">Create Account</button>
            </div>

            <form class="auth-form" id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth" id="authSubmit">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <!-- Navigation -->
        <nav>
            <div class="nav-container">
                <div class="nav-brand">Studyos</div>
                <div class="nav-right">
                    <div class="user-info">
                        <span id="userEmail"></span>
                        <div class="user-avatar" id="userAvatar"></div>
                    </div>
                    <button class="btn-signout" id="signoutBtn">Sign Out</button>
                </div>
            </div>
        </nav>

        <!-- Dashboard -->
        <div class="dashboard">
            <div class="welcome-section">
                <h1 id="welcomeMessage">Welcome back! ✨</h1>
                <p>Your notes are ready for you</p>
            </div>

            <div class="notes-section">
                <div class="section-header">
                    <h2>Your Notes</h2>
                    <button class="btn-new" id="newNoteBtn">+ New Note</button>
                </div>

                <div id="notesContainer">
                    <!-- Notes will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div class="editor-modal" id="editorModal">
        <div class="editor-container">
            <div class="editor-header">
                <input type="text" class="editor-title-input" id="editorTitle" placeholder="Untitled Note">
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="format('bold')" title="Bold">𝐁</button>
                <button class="toolbar-btn" onclick="format('italic')" title="Italic">𝐼</button>
                <button class="toolbar-btn" onclick="format('underline')" title="Underline">U̲</button>
                <button class="toolbar-btn" onclick="format('insertUnorderedList')" title="List">•</button>
            </div>
            <div class="editor-content-wrapper">
                <div class="editor-content" id="editorContent" contenteditable="true"></div>
            </div>
            <div class="editor-footer">
                <span class="save-status" id="saveStatus">Saved</span>
                <button class="btn-close" id="closeEditorBtn">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabase = createClient(
            'https://rlxlnmcesiagglmajzwh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJseGxubWNlc2lhZ2dsbWFqendoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjU3NTAsImV4cCI6MjA4ODY0MTc1MH0.KVawKGf8JOUymKP5DkjIRNawrkV-VraFDdFVasKhyrE'
        );

        // Global state
        let currentUser = null;
        let notes = [];
        let currentNote = null;
        let saveTimeout = null;
        let authMode = 'login';

        // Initialize
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                await loadNotes();
                showApp();
            }
            setupEventListeners();
        }

        function setupEventListeners() {
            // Auth tabs
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    authMode = tab.dataset.tab;
                    document.getElementById('authSubmit').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
                });
            });

            // Auth form
            document.getElementById('authForm').addEventListener('submit', handleAuth);

            // Sign out
            document.getElementById('signoutBtn').addEventListener('click', signOut);

            // New note
            document.getElementById('newNoteBtn').addEventListener('click', createNewNote);

            // Close editor
            document.getElementById('closeEditorBtn').addEventListener('click', closeEditor);

            // Editor inputs
            document.getElementById('editorTitle').addEventListener('input', handleEditorChange);
            document.getElementById('editorContent').addEventListener('input', handleEditorChange);

            // Click outside modal to close
            document.getElementById('editorModal').addEventListener('click', (e) => {
                if (e.target.id === 'editorModal') closeEditor();
            });
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (authMode === 'signup') {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    alert('Check your email to confirm your account!');
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                    await loadNotes();
                    showApp();
                }
            } catch (error) {
                alert(error.message);
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            currentUser = null;
            notes = [];
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('active');
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('userAvatar').textContent = currentUser.email[0].toUpperCase();
            renderNotes();
        }

        async function loadNotes() {
            const { data, error } = await supabase
                .from('notes')
                .select('*')
                .order('updated_at', { ascending: false });
            
            if (!error) {
                notes = data || [];
            }
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>No notes yet</h3>
                        <p>Create your first note to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="notes-grid">
                    ${notes.map((note, i) => `
                        <div class="note-card" style="animation-delay: ${i * 0.05}s" onclick="openNote('${note.id}')">
                            <div class="note-header">
                                <h3 class="note-title">${note.title || 'Untitled'}</h3>
                            </div>
                            <div class="note-preview">${getPreview(note.content)}</div>
                            <div class="note-footer">
                                <span class="note-date">${formatDate(note.updated_at)}</span>
                                <div class="note-actions">
                                    <div class="note-action" onclick="event.stopPropagation(); deleteNote('${note.id}')">🗑️</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getPreview(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            const text = div.textContent || div.innerText || '';
            return text || 'Empty note';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const hours = diff / (1000 * 60 * 60);
            
            if (hours < 24) {
                return hours < 1 ? 'Just now' : `${Math.floor(hours)}h ago`;
            }
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        async function createNewNote() {
            const { data, error } = await supabase
                .from('notes')
                .insert([{ user_id: currentUser.id, title: 'Untitled', content: '' }])
                .select()
                .single();
            
            if (!error) {
                notes.unshift(data);
                currentNote = data;
                openEditorModal();
            }
        }

        window.openNote = function(noteId) {
            currentNote = notes.find(n => n.id === noteId);
            openEditorModal();
        };

        function openEditorModal() {
            document.getElementById('editorTitle').value = currentNote.title || '';
            document.getElementById('editorContent').innerHTML = currentNote.content || '';
            document.getElementById('editorModal').classList.add('active');
            document.getElementById('editorTitle').focus();
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
            currentNote = null;
        }

        function handleEditorChange() {
            if (!currentNote) return;
            
            currentNote.title = document.getElementById('editorTitle').value || 'Untitled';
            currentNote.content = document.getElementById('editorContent').innerHTML;
            
            document.getElementById('saveStatus').textContent = 'Saving...';
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveNote, 500);
        }

        async function saveNote() {
            if (!currentNote) return;
            
            const { error } = await supabase
                .from('notes')
                .update({
                    title: currentNote.title,
                    content: currentNote.content,
                    updated_at: new Date().toISOString()
                })
                .eq('id', currentNote.id);
            
            if (!error) {
                document.getElementById('saveStatus').textContent = 'Saved ✓';
                await loadNotes();
                renderNotes();
            }
        }

        window.deleteNote = async function(noteId) {
            if (!confirm('Delete this note?')) return;
            
            const { error } = await supabase
                .from('notes')
                .delete()
                .eq('id', noteId);
            
            if (!error) {
                notes = notes.filter(n => n.id !== noteId);
                renderNotes();
                
                // Confetti celebration
                createConfetti();
            }
        };

        window.format = function(command) {
            document.execCommand(command, false, null);
            document.getElementById('editorContent').focus();
            handleEditorChange();
        };

        function createConfetti() {
            const colors = ['#D97757', '#6B8E7F', '#C85846', '#A4C3B2'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    width: 10px;
                    height: 10px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: ${Math.random() * 100}%;
                    top: -10px;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    pointer-events: none;
                    z-index: 9999;
                    animation: confetti ${2 + Math.random()}s linear forwards;
                `;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
