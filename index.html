<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studyos – Your Learning Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F0;
            --ink: #2D2A26;
            --terracotta: #D97757;
            --forest: #6B8E7F;
            --sand: #E8DCC4;
            --warm-red: #C85846;
            --soft-green: #A4C3B2;
            --deep-ink: #1A1816;
            --stroke: rgba(45, 42, 38, 0.12);
            --glow: rgba(217, 119, 87, 0.2);
        }
        [data-theme="dark"] {
            --cream: #0f0e0d;
            --ink: #f5f5f0;
            --sand: #1a1816;
            --stroke: rgba(245, 245, 240, 0.15);
            --terracotta: #ff8a65;
            --forest: #81c784;
            --warm-red: #ff5252;
            --soft-green: #b2dfdb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; overflow-x: hidden; transition: background 0.3s; }
        h1, h2, h3 { font-family: 'Fraunces', serif; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(1000px) rotate(720deg); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes correctFlash { 0% { background: var(--soft-green); } 100% { background: white; } }
        @keyframes wrongFlash { 0% { background: var(--warm-red); } 100% { background: white; } }
        
        .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--cream) 0%, var(--sand) 100%); padding: 2rem; }
        .auth-container { background: white; border: 3px solid var(--stroke); border-radius: 24px; padding: 3rem; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(45, 42, 38, 0.08); animation: fadeInUp 0.6s ease; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-size: 3rem; font-weight: 900; color: var(--ink); margin-bottom: 0.5rem; }
        .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 3px solid var(--stroke); }
        .auth-tab { flex: 1; padding: 0.8rem; border: none; background: none; font-weight: 600; color: var(--ink); opacity: 0.4; cursor: pointer; transition: all 0.3s; position: relative; }
        .auth-tab.active { opacity: 1; color: var(--terracotta); }
        .auth-tab.active::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 3px; background: var(--terracotta); }
        .auth-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select { padding: 1rem; border: 2px solid var(--stroke); border-radius: 12px; font-size: 1rem; background: var(--cream); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--terracotta); box-shadow: 0 0 0 4px var(--glow); }
        .btn-auth { padding: 1.1rem; background: linear-gradient(135deg, var(--terracotta), var(--warm-red)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(217, 119, 87, 0.4); }
        
        .app-container { display: none; }
        .app-container.active { display: flex; min-height: 100vh; }
        
        .sidebar { width: 280px; background: white; border-right: 3px solid var(--stroke); padding: 2rem 1.5rem; position: fixed; left: 0; top: 0; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar-brand { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #feca57); padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; text-align: center; color: white; font-weight: 700; box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3); }
        .streak-badge .number { font-size: 2rem; display: block; }
        .streak-badge .label { font-size: 0.85rem; opacity: 0.9; }
        .sidebar-section { margin-bottom: 2rem; }
        .sidebar-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; opacity: 0.5; margin-bottom: 1rem; letter-spacing: 0.05em; }
        .sidebar-item { padding: 0.8rem 1rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.3rem; }
        .sidebar-item:hover { background: var(--sand); }
        .sidebar-item.active { background: var(--terracotta); color: white; font-weight: 600; }
        .sidebar-item-icon { font-size: 1.2rem; }
        .sidebar-item-count { margin-left: auto; font-size: 0.85rem; opacity: 0.6; }
        .folder-item { padding: 0.6rem 1rem; padding-left: 2rem; }
        .btn-new-folder { width: 100%; padding: 0.8rem; background: var(--cream); border: 2px dashed var(--stroke); border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-new-folder:hover { background: var(--sand); border-style: solid; }
        .user-section { margin-top: auto; padding-top: 1.5rem; border-top: 2px solid var(--stroke); }
        .user-info { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--terracotta), var(--forest)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .btn-signout { width: 100%; padding: 0.7rem; background: transparent; border: 2px solid var(--stroke); border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-signout:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
        
        .main-content { margin-left: 280px; flex: 1; padding: 2rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .search-box { flex: 1; max-width: 400px; position: relative; }
        .search-box input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 2px solid var(--stroke); border-radius: 50px; background: white; }
        .search-box::before { content: '🔍'; position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); }
        .top-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .btn-icon { width: 42px; height: 42px; border: 2px solid var(--stroke); border-radius: 12px; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1.2rem; }
        .btn-icon:hover { background: var(--terracotta); color: white; border-color: var(--terracotta); }
        .btn-icon.active { background: var(--terracotta); color: white; }
        .btn-primary { padding: 0.8rem 1.8rem; background: linear-gradient(135deg, var(--terracotta), var(--warm-red)); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217, 119, 87, 0.4); }
        
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .note-card { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 1.5rem; cursor: pointer; transition: all 0.3s; position: relative; }
        .note-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(45, 42, 38, 0.1); border-color: var(--terracotta); }
        .note-card.pinned::before { content: '📌'; position: absolute; top: 1rem; right: 1rem; font-size: 1.2rem; }
        .note-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.8rem; }
        .note-preview { font-size: 0.9rem; opacity: 0.7; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .note-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .note-tag { padding: 0.3rem 0.8rem; background: var(--sand); border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        .note-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 2px solid var(--stroke); font-size: 0.85rem; }
        .note-date { opacity: 0.5; }
        .note-folder-tag { padding: 0.3rem 0.8rem; background: var(--sand); border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        
        .calendar-container { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 2rem; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .calendar-header h2 { font-size: 1.8rem; font-weight: 700; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1rem; }
        .calendar-day { padding: 1rem; border: 2px solid var(--stroke); border-radius: 12px; min-height: 120px; cursor: pointer; transition: all 0.2s; }
        .calendar-day:hover { border-color: var(--terracotta); background: var(--sand); }
        .calendar-day-number { font-weight: 700; margin-bottom: 0.5rem; }
        .calendar-task { font-size: 0.75rem; padding: 0.3rem 0.5rem; background: var(--terracotta); color: white; border-radius: 6px; margin-bottom: 0.3rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .calendar-task.completed { opacity: 0.5; text-decoration: line-through; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 1.5rem; }
        .stat-value { font-size: 2.5rem; font-weight: 900; color: var(--terracotta); margin-bottom: 0.3rem; }
        .stat-label { font-size: 0.9rem; opacity: 0.6; font-weight: 600; }
        
        .timer-widget { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 2rem; }
        .timer-display { font-size: 4rem; font-weight: 900; color: var(--terracotta); margin: 1rem 0; font-family: 'Courier New', monospace; }
        .timer-controls { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
        .affirmation { font-size: 1.1rem; font-weight: 600; color: var(--forest); margin-top: 1rem; font-style: italic; }
        
        .quiz-list { display: grid; gap: 1rem; }
        .quiz-card { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 1.5rem; cursor: pointer; transition: all 0.3s; }
        .quiz-card:hover { transform: translateY(-4px); border-color: var(--terracotta); }
        .quiz-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
        .quiz-meta { font-size: 0.9rem; opacity: 0.6; }
        
        .quiz-container { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 2rem; max-width: 700px; margin: 0 auto; }
        .question-card { background: var(--sand); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
        .question-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
        .question-options { display: flex; flex-direction: column; gap: 1rem; }
        .option-btn { padding: 1rem; border: 2px solid var(--stroke); border-radius: 12px; background: white; cursor: pointer; text-align: left; font-weight: 600; transition: all 0.2s; }
        .option-btn:hover { background: var(--cream); border-color: var(--terracotta); }
        .option-btn.correct { background: var(--soft-green) !important; color: white; animation: correctFlash 0.5s; }
        .option-btn.wrong { background: var(--warm-red) !important; color: white; animation: wrongFlash 0.5s, shake 0.5s; }
        .quiz-score { text-align: center; font-size: 3rem; font-weight: 900; color: var(--terracotta); margin: 2rem 0; }
        
        .editor-modal { display: none; position: fixed; inset: 0; background: rgba(45, 42, 38, 0.6); backdrop-filter: blur(10px); z-index: 2000; padding: 2rem; }
        .editor-modal.active { display: flex; align-items: center; justify-content: center; }
        .editor-container { background: white; border: 3px solid var(--stroke); border-radius: 24px; max-width: 900px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
        .editor-header { padding: 1.5rem 2rem; border-bottom: 2px solid var(--stroke); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .editor-title-input { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; border: none; outline: none; flex: 1; min-width: 200px; }
        .editor-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .editor-meta select, .editor-meta input { padding: 0.5rem; border: 2px solid var(--stroke); border-radius: 8px; font-size: 0.9rem; }
        .editor-toolbar { padding: 1rem 2rem; border-bottom: 2px solid var(--stroke); display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .toolbar-btn { padding: 0.5rem 0.8rem; border: 2px solid var(--stroke); border-radius: 8px; background: var(--cream); cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .toolbar-btn:hover { background: var(--terracotta); color: white; border-color: var(--terracotta); }
        .editor-content-wrapper { flex: 1; overflow-y: auto; padding: 2rem; }
        .editor-content { font-size: 1.1rem; line-height: 1.8; outline: none; min-height: 400px; }
        .editor-content:empty::before { content: 'Start writing...'; opacity: 0.3; font-style: italic; }
        .editor-content h1 { font-size: 2rem; font-weight: 700; margin: 1.5rem 0 1rem; }
        .editor-content h2 { font-size: 1.6rem; font-weight: 700; margin: 1.3rem 0 0.8rem; }
        .editor-content h3 { font-size: 1.3rem; font-weight: 700; margin: 1.1rem 0 0.6rem; }
        .editor-content blockquote { border-left: 4px solid var(--terracotta); padding-left: 1rem; margin: 1rem 0; opacity: 0.8; font-style: italic; }
        .editor-content pre { background: var(--sand); padding: 1rem; border-radius: 8px; overflow-x: auto; font-family: 'Courier New', monospace; margin: 1rem 0; }
        .editor-content code { background: var(--sand); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.95em; }
        .editor-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .editor-content table td, .editor-content table th { border: 2px solid var(--stroke); padding: 0.8rem; text-align: left; }
        .editor-content table th { background: var(--sand); font-weight: 700; }
        .note-link { color: var(--terracotta); text-decoration: underline; cursor: pointer; }
        .backlinks-panel { background: var(--sand); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .editor-footer { padding: 1.5rem 2rem; border-top: 2px solid var(--stroke); display: flex; justify-content: space-between; align-items: center; }
        .save-status { font-size: 0.9rem; color: var(--forest); font-weight: 600; }
        .editor-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .btn-secondary { padding: 0.7rem 1.5rem; background: transparent; border: 2px solid var(--stroke); border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: var(--sand); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(45, 42, 38, 0.6); backdrop-filter: blur(10px); z-index: 3000; align-items: center; justify-content: center; padding: 2rem; }
        .modal.active { display: flex; }
        .modal-content { background: white; border: 3px solid var(--stroke); border-radius: 16px; padding: 2rem; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .modal-body { margin-bottom: 1.5rem; }
        .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
        
        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
        .empty-state h3 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .empty-state p { opacity: 0.6; }
        
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid var(--stroke); border-top-color: var(--terracotta); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; pointer-events: none; animation: confetti 3s linear forwards; }
        
        .achievement-popup { position: fixed; top: 2rem; right: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 1.5rem 2rem; border-radius: 16px; box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4); z-index: 9999; display: none; animation: fadeInUp 0.5s ease; }
        .achievement-popup.show { display: block; }
        .achievement-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .achievement-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 0.3rem; }
        .achievement-desc { opacity: 0.9; font-size: 0.9rem; }
        
        .rearrange-mode .note-card { cursor: move; transition: all 0.2s; }
        .rearrange-mode .note-card:hover { transform: scale(1.05); box-shadow: 0 12px 30px rgba(217, 119, 87, 0.3); }
        .rearrange-mode .note-card.dragging { opacity: 0.5; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .notes-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .top-actions { width: 100%; }
            .search-box { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="auth-screen" id="authScreen">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Studyos</h1>
                <p>Your learning companion</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="signup">Create Account</button>
            </div>
            <form class="auth-form" id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group" id="schoolGroup" style="display: none;">
                    <label for="school">School</label>
                    <select id="school">
                        <option value="salesianum">Salesianum School</option>
                        <option value="stpeter">St. Peter Cathedral</option>
                    </select>
                </div>
                <button type="submit" class="btn-auth" id="authSubmit">Sign In</button>
            </form>
        </div>
    </div>

    <div class="app-container" id="appContainer">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">Studyos</div>
            
            <div class="streak-badge">
                <span class="number" id="streakNumber">0</span>
                <span class="label">🔥 Day Streak</span>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">Views</div>
                <div class="sidebar-item active" data-view="all">
                    <span class="sidebar-item-icon">📝</span>
                    <span>All Notes</span>
                    <span class="sidebar-item-count" id="allNotesCount">0</span>
                </div>
                <div class="sidebar-item" data-view="pinned">
                    <span class="sidebar-item-icon">📌</span>
                    <span>Pinned</span>
                    <span class="sidebar-item-count" id="pinnedCount">0</span>
                </div>
                <div class="sidebar-item" data-view="calendar">
                    <span class="sidebar-item-icon">📅</span>
                    <span>Planner</span>
                </div>
                <div class="sidebar-item" data-view="timer">
                    <span class="sidebar-item-icon">⏱️</span>
                    <span>Focus Timer</span>
                </div>
                <div class="sidebar-item" data-view="quizzes">
                    <span class="sidebar-item-icon">🎯</span>
                    <span>Quizzes</span>
                </div>
                <div class="sidebar-item" data-view="stats">
                    <span class="sidebar-item-icon">📊</span>
                    <span>Stats</span>
                </div>
                <div class="sidebar-item" data-view="grades">
                    <span class="sidebar-item-icon">📈</span>
                    <span>Grade Calculator</span>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">Actions</div>
                <div class="sidebar-item" id="rearrangeModeBtn">
                    <span class="sidebar-item-icon">✨</span>
                    <span>Rearrange Mode</span>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">Folders</div>
                <div id="foldersList"></div>
                <button class="btn-new-folder" id="newFolderBtn">+ New Folder</button>
            </div>
            
            <div class="user-section">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight: 600; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis;" id="userEmail"></div>
                        <div style="font-size: 0.8rem; opacity: 0.6;" id="userSchool"></div>
                    </div>
                </div>
                <button class="btn-signout" id="signoutBtn">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search notes...">
                </div>
                <div class="top-actions">
                    <button class="btn-icon" id="darkModeBtn" title="Toggle dark mode">🌙</button>
                    <button class="btn-icon" id="templateBtn" title="New from template">📋</button>
                    <button class="btn-primary" id="newNoteBtn">+ New Note</button>
                </div>
            </div>

            <div id="mainView"></div>
        </main>
    </div>

    <div class="editor-modal" id="editorModal">
        <div class="editor-container">
            <div class="editor-header">
                <input type="text" class="editor-title-input" id="editorTitle" placeholder="Untitled Note">
                <div class="editor-meta">
                    <select id="editorFolder">
                        <option value="">No Folder</option>
                    </select>
                    <button class="btn-icon" id="pinNoteBtn" title="Pin note">📌</button>
                </div>
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="format('bold')"><b>B</b></button>
                <button class="toolbar-btn" onclick="format('italic')"><i>I</i></button>
                <button class="toolbar-btn" onclick="format('underline')"><u>U</u></button>
                <button class="toolbar-btn" onclick="format('insertUnorderedList')">• List</button>
                <button class="toolbar-btn" onclick="insertHeading(1)">H1</button>
                <button class="toolbar-btn" onclick="insertHeading(2)">H2</button>
                <button class="toolbar-btn" onclick="insertHeading(3)">H3</button>
                <button class="toolbar-btn" onclick="insertQuote()">Quote</button>
                <button class="toolbar-btn" onclick="insertCode()">Code</button>
                <button class="toolbar-btn" onclick="insertTable()">Table</button>
                <button class="toolbar-btn" onclick="insertLink()">[[Link]]</button>
                <button class="toolbar-btn" onclick="insertTag()">#Tag</button>
                <button class="toolbar-btn" onclick="aiFormat()" style="background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; border: none;">📄 Export as DOCX</button>
            </div>
            <div class="editor-content-wrapper">
                <div class="editor-content" id="editorContent" contenteditable="true"></div>
                <div class="backlinks-panel" id="backlinksPanel" style="display: none;">
                    <strong>Linked from:</strong>
                    <div id="backlinksList"></div>
                </div>
            </div>
            <div class="editor-footer">
                <span class="save-status" id="saveStatus">Saved</span>
                <div class="editor-actions">
                    <button class="btn-secondary" id="shareBtn">🔗 Share</button>
                    <button class="btn-secondary" id="exportBtn">Export</button>
                    <button class="btn-secondary" id="deleteNoteBtn">Delete</button>
                    <button class="btn-primary" id="closeEditorBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle"></h3>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn-primary" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <div class="achievement-popup" id="achievementPopup">
        <div class="achievement-icon" id="achievementIcon">🏆</div>
        <div class="achievement-title" id="achievementTitle">Achievement Unlocked!</div>
        <div class="achievement-desc" id="achievementDesc">You did it!</div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
